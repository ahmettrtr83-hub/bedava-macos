name: macOS-Xcode-Sistemi
on: workflow_dispatch

jobs:
  macos-calistir:
    runs-on: macos-13
    steps:
      - name: Aracları Yukle
        run: |
          brew install --cask ngrok
          brew install tigervnc
          
      - name: Ngrok Giris
        run: ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
        
      - name: Sanal Ekran Ac (Hatasiz Mod)
        run: |
          # Sifre dosyasini otomatik olusturuyoruz (Sifre: 123456)
          mkdir -p ~/.vnc
          echo "123456" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Hata veren 'kickstart' yerine kendi sanal ekranimizi aciyoruz
          # Bu komut eski sifre sormaz ve hata vermez
          vncserver :1 -geometry 1280x800 -depth 24
          
      - name: Tuneli Baslat ve Baglan
        run: |
          # VNC Portu (5901) uzerinden tunel aciyoruz
          ngrok tcp --region eu 5901 > /dev/null &
          sleep 20
          # Baglanti adresini ekrana yazdir
          curl --silent http://127.0.0.1 | jq -r '.tunnels.public_url'
          
      - name: 6 Saat Acik Tut
        run: sleep 21600
