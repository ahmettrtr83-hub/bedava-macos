name: macOS-VNC-Baglantisi
on: workflow_dispatch

jobs:
  macos-calistir:
    runs-on: macos-13 # Hata vermeyen daha stabil bir sürüm seçtik
    steps:
      - name: Ngrok Yukle
        run: brew install --cask ngrok
      
      - name: Ngrok Giris
        run: ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
      
      - name: Sifre ve Ekran Ayari
        run: |
          # Kullanıcı şifresini 1234 yap
          sudo dscl . -passwd /Users/runner 1234
          # Ekran paylaşımını en temel komutla deniyoruz (Hata payı düşük)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -allowAccessFor -allUsers
          
      - name: Tuneli Baslat
        run: |
          # VNC Portunu aç
          ngrok tcp --region eu 5900 > /dev/null &
          sleep 20
          # Bağlantı linkini ver
          curl --silent http://127.0.0.1 | jq -r '.tunnels[0].public_url'
          
      - name: 6 Saat Acik Tut
        run: sleep 21600
