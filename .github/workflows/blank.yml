name: macOS-VNC-Baglantisi
on: workflow_dispatch

jobs:
  macos-calistir:
    runs-on: macos-latest
    steps:
      - name: Ngrok Yukle
        run: brew install --cask ngrok
      
      - name: Ngrok Giris
        run: ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
      
      - name: Ekran Paylasimini Ac (Yeni Yontem)
        run: |
          # Kullanıcı şifresini belirle
          sudo dscl . -passwd /Users/runner 1234
          
          # Ekran paylaşımını en temel seviyede aktif et
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvncpasswd -vncpasswd 1234 -restart -agent -privs -all
          
      - name: Tuneli Baslat ve Adres Al
        run: |
          # VNC portunu (5900) Avrupa sunucusu üzerinden aç
          ngrok tcp --region eu 5900 > /dev/null &
          sleep 15
          # Bağlantı adresini ekrana yazdır
          curl --silent http://127.0.0.1 | jq -r '.tunnels[0].public_url'
          
      - name: 6 Saat Acik Tut
        run: sleep 21600
