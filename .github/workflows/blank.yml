name: macOS-VNC-Baglantisi
on: workflow_dispatch

jobs:
  macos-calistir:
    runs-on: macos-13
    steps:
      - name: Gerekli Aracları Yukle (Ngrok ve TigerVNC)
        run: brew install --cask ngrok tigervnc-viewer && brew install tigervnc

      - name: Ngrok Giris
        run: ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

      - name: VNC Sunucusunu Baslat (Apple Servisini Bypass Et)
        run: |
          # VNC için rastgele bir şifre dosyası oluşturuyoruz (123456)
          mkdir -p ~/.vnc
          echo "123456" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # VNC sunucusunu 5900 portunda arka planda çalıştırıyoruz
          # Bu komut Apple'ın kısıtlamalarına takılmaz
          /opt/homebrew/bin/Xvnc :0 -rfbauth ~/.vnc/passwd -geometry 1280x800 & 
          sleep 5

      - name: Tuneli Baslat ve Adres Al
        run: |
          # Ngrok tünelini aç
          ngrok tcp --region eu 5900 > /dev/null &
          sleep 15
          # Bağlantı adresini yazdır
          curl --silent http://127.0.0.1 | jq -r '.tunnels.public_url'

      - name: 6 Saat Acik Tut
        run: sleep 21600
